name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  pull-requests: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Judy library
        run: sudo apt-get update && sudo apt-get install -y libjudy-dev

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Build the extension
        run: |
          phpize
          ./configure --with-judy=/usr
          make

      - name: Run tests
        run: make test TESTS=tests/ NO_INTERACTION=1 REPORT_EXIT_STATUS=1 TEST_PHP_JUNIT=junit.xml

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-linux-${{ matrix.php-version }}
          path: junit.xml
          if-no-files-found: ignore

      - name: Install PIE
        if: matrix.php-version == '8.4'
        run: |
          curl -fsSL https://github.com/php/pie/releases/latest/download/pie.phar \
            -o /usr/local/bin/pie
          chmod +x /usr/local/bin/pie
          pie --version

      - name: Install v2.3.0 baseline via PIE
        if: matrix.php-version == '8.4'
        run: |
          sudo pie install --skip-enable-extension orieg/judy:2.3.0 \
            --with-judy=/usr
          BASELINE_SO="$(php-config --extension-dir)/judy.so"
          echo "BASELINE_SO=$BASELINE_SO" >> "$GITHUB_ENV"
          php -d "extension=$BASELINE_SO" -r \
            'echo "Baseline loaded: judy " . judy_version() . "\n";'

      - name: Run baseline benchmarks
        if: matrix.php-version == '8.4'
        run: |
          mkdir -p /tmp/php-judy-baseline-ini
          echo "extension=$BASELINE_SO" > /tmp/php-judy-baseline-ini/judy.ini

          # v2.3.0 only has the 5 core types (no hash/adaptive/packed/API)
          PHP_INI_SCAN_DIR=/tmp/php-judy-baseline-ini php examples/judy-bench.php \
            --json baseline-bench.json --size 500000 --iterations 7 --suite core \
            2>&1 | tee baseline-benchmark-output.txt

      - name: Upload baseline benchmark results
        if: always() && matrix.php-version == '8.4'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline-linux-php${{ matrix.php-version }}
          path: |
            baseline-bench.json
            baseline-benchmark-output.txt
          if-no-files-found: ignore

      - name: Run benchmarks
        run: |
          JUDY_SO="$(pwd)/modules/judy.so"
          mkdir -p /tmp/php-judy-ini
          echo "extension=$JUDY_SO" > /tmp/php-judy-ini/judy.ini

          # Unified benchmark: all suites, JSON output for cross-version comparison
          PHP_INI_SCAN_DIR=/tmp/php-judy-ini php examples/judy-bench.php \
            --json bench.json --size 500000 --iterations 7 --suite all \
            2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-linux-php${{ matrix.php-version }}
          path: |
            bench.json
            benchmark-output.txt
          if-no-files-found: ignore

  validate-pecl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify PHP_JUDY_VERSION matches package.xml
        run: |
          SRC_VER=$(grep -oP '(?<=#define PHP_JUDY_VERSION ")[^"]+' php_judy.h)
          PKG_VER=$(grep -oP '(?<=<release>)[^<]+' package.xml | head -1)
          echo "php_judy.h:  PHP_JUDY_VERSION = $SRC_VER"
          echo "package.xml: <release>         = $PKG_VER"
          if [ "$SRC_VER" != "$PKG_VER" ]; then
            echo "ERROR: version mismatch — update PHP_JUDY_VERSION in php_judy.h to $PKG_VER"
            exit 1
          fi

      - name: Install Judy library
        run: sudo apt-get update && sudo apt-get install -y libjudy-dev

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Build PECL package
        run: pecl package package.xml

      - name: Install from PECL package
        run: sudo pecl install --force ./Judy-*.tgz

      - name: Run tests against installed extension
        run: |
          JUDY_SO="$(php -r 'echo PHP_EXTENSION_DIR . DIRECTORY_SEPARATOR;')judy.so"
          RUN_TESTS=$(find "$(php-config --prefix)" -name run-tests.php 2>/dev/null | head -1)
          # run-tests.php writes temp files next to itself; copy to /tmp to avoid
          # "Permission denied" on the system-installed (root-owned) build directory.
          cp "$RUN_TESTS" /tmp/run-tests.php
          NO_INTERACTION=1 php /tmp/run-tests.php \
            -d "extension=$JUDY_SO" \
            -q --show-diff \
            tests/*.phpt

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        arch: ["x64"]
        ts: ["nts"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build libjudy from source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"

          # Download Judy-1.0.5 source from SourceForge
          Write-Host "Downloading Judy-1.0.5 source..."
          & curl.exe -fsSL -o judy.tar.gz --retry 5 --retry-delay 5 -L `
            "https://downloads.sourceforge.net/project/judy/judy/Judy-1.0.5/Judy-1.0.5.tar.gz"
          if ($LASTEXITCODE -ne 0) { throw "Failed to download Judy source" }

          # Extract
          tar -xzf judy.tar.gz
          $judyDir = Get-ChildItem -Directory | Where-Object { $_.Name -match '^[Jj]udy-' } | Select-Object -First 1
          if (-not $judyDir) { throw "Could not find extracted Judy directory" }
          $srcDir = Join-Path $judyDir.FullName "src"
          if (-not (Test-Path (Join-Path $srcDir "build.bat"))) {
            throw "build.bat not found in $srcDir"
          }
          Write-Host "Source: $srcDir"

          # Patch Judy.h: Fix Word_t for 64-bit Windows and PJERR sentinel
          Write-Host "Patching Judy.h..."
          $judyH = Join-Path $srcDir "Judy.h"
          $content = Get-Content $judyH -Raw

          # Fix Word_t: unsigned long is only 4 bytes on MSVC x64 (LLP64),
          # use unsigned __int64 for proper 64-bit Word_t
          $wordTPatch = @'
          #if defined(_WIN64)
          typedef unsigned __int64    Word_t, * PWord_t;
          #else
          typedef unsigned long       Word_t, * PWord_t;
          #endif
          '@
          # Trim indentation added by YAML here-string
          $wordTPatch = ($wordTPatch.Trim() -split "`n" | ForEach-Object { $_.Trim() }) -join "`n"
          $content = $content -replace 'typedef\s+unsigned\s+long\s+Word_t\s*,\s*\*\s*PWord_t\s*;', $wordTPatch

          # Fix PJERR/PPJERR: ~0UL is 32-bit on MSVC x64, use ~(size_t)0
          # to get the correct 64-bit error sentinel
          $content = $content.Replace('(~0UL)', '(~(size_t)0)')

          # Validate patches applied
          if ($content -notmatch 'unsigned __int64\s+Word_t') { throw "Failed to patch Word_t in Judy.h" }
          if ($content -notmatch '~\(size_t\)0') { throw "Failed to patch PJERR in Judy.h" }
          Set-Content $judyH -Value $content -NoNewline
          Write-Host "Patched Judy.h"

          # Patch build.bat: Add -DJU_64BIT for proper 64-bit internal data structures
          # and /MD to use the dynamic C runtime (matching PHP's CRT linkage)
          Write-Host "Patching build.bat..."
          $buildBat = Join-Path $srcDir "build.bat"
          $batContent = Get-Content $buildBat -Raw
          $batContent = $batContent.Replace('-DJU_WIN', '-DJU_WIN -DJU_64BIT /MD')
          if ($batContent -notmatch 'JU_64BIT') { throw "Failed to patch build.bat" }
          Set-Content $buildBat -Value $batContent -NoNewline
          Write-Host "Patched build.bat"

          # Fix all unsigned-long constants that break on MSVC x64 (LLP64 model).
          # On MSVC x64, `unsigned long` is 4 bytes, so any UL constant used in a
          # 64-bit context silently truncates:
          #
          #   ~0UL       -> 0xFFFFFFFF  (breaks cJU_ALLONES, memory ceiling, etc.)
          #   (-1UL)     -> 0xFFFFFFFF  (breaks max-pop sentinels in JudyPrivateBranch.h)
          #   1UL << N   -> 0 when N>=32 (breaks JudyInsArray.c, JudyPrevNextEmpty.c)
          #   1L  << N   -> sign-extends to 0xFFFFFFFF80000000 when N=31; 0 when N>=32
          #                 (breaks JU_BITPOSMASKB/L in JudyPrivate.h)
          #   0x100UL    -> 0x100 as 32-bit; JU_LEASTBYTESMASK wrong for BYTES>4
          #   0xffL      -> 0xff as 32-bit; cJU_MASKATSTATE yields 0 for State>=5
          #                 (breaks JU_SETDIGIT/cascade for JudySL with long strings)
          #
          # The root cause of the 17-min hang in PrevNextEmpty: bitposmaskL was
          # initialised to `1UL << 63` = 0 on MSVC x64, creating an infinite loop.
          Write-Host "Fixing UL constants in Judy source files..."
          $fixCount = 0
          Get-ChildItem -Path $judyDir.FullName -Recurse -Include "*.c","*.h" | ForEach-Object {
            $orig = Get-Content $_.FullName -Raw
            $text = $orig
            # All-ones patterns
            $text = $text.Replace('~0UL',    '~(Word_t)0')
            $text = $text.Replace('(-1UL)',  '(~(Word_t)0)')
            # Shift-base patterns (order matters: 1UL before 1L to avoid double-replace)
            $text = [regex]::Replace($text, '\b1UL\s*<<', '(Word_t)1 <<')
            $text = [regex]::Replace($text, '\b1L\s*<<',  '(Word_t)1 <<')
            # Least-bytes mask base constant
            $text = $text.Replace('0x100UL', '(Word_t)0x100')
            # Byte-mask base constant (cJU_MASKATSTATE in JudyPrivateBranch.h)
            $text = $text.Replace('0xffL', '(Word_t)0xff')
            if ($text -ne $orig) {
              Set-Content $_.FullName -Value $text -NoNewline
              $fixCount++
            }
          }
          Write-Host "Fixed UL constants in $fixCount files"

          # Build
          Write-Host "Building libjudy..."
          Push-Location $srcDir
          & cmd.exe /c "build.bat 2>&1"
          Pop-Location

          # Verify build output
          $judyLib = Get-ChildItem -Path $srcDir -Recurse -Filter "Judy.lib" -ErrorAction SilentlyContinue |
            Sort-Object Length -Descending | Select-Object -First 1
          if (-not $judyLib) {
            Write-Host "Build artifacts found:"
            Get-ChildItem -Path $srcDir -Recurse -Include "*.lib","*.dll","*.obj" -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  $($_.FullName) ($($_.Length) bytes)" }
            throw "Judy.lib not found after build"
          }
          Write-Host "Built: $($judyLib.FullName) ($($judyLib.Length) bytes)"

          # Install to libjudy/{include,lib,bin} outside workspace.
          # php-windows-builder runs git clean -ffdx which removes untracked
          # files from the workspace, so we install to RUNNER_TEMP instead.
          $installDir = Join-Path $env:RUNNER_TEMP "libjudy"
          foreach ($sub in @("include", "lib", "bin")) {
            New-Item -ItemType Directory -Force (Join-Path $installDir $sub) | Out-Null
          }

          Copy-Item $judyH "$installDir\include\"
          Copy-Item $judyLib.FullName "$installDir\lib\libJudy.lib"
          Copy-Item $judyLib.FullName "$installDir\lib\libJudy_a.lib"

          # Copy DLL if produced (for dynamic linking)
          $judyDll = Get-ChildItem -Path $srcDir -Recurse -Filter "Judy.dll" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($judyDll) {
            Copy-Item $judyDll.FullName "$installDir\bin\"
            Write-Host "Installed DLL: $($judyDll.Length) bytes"
          }

          Write-Host "=== libjudy installed ==="
          Get-ChildItem -Path $installDir -Recurse -File | ForEach-Object {
            $rel = $_.FullName.Substring($installDir.Length)
            Write-Host "  $rel ($($_.Length) bytes)"
          }

      - name: Add libjudy to PATH
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_PATH "${{ runner.temp }}\libjudy\bin"

      - name: Disable Windows Error Reporting
        shell: pwsh
        run: |
          # Prevent WER from intercepting crashed test processes and stalling
          # run-tests.php for minutes per crash (STATUS_ACCESS_VIOLATION).
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /v Disabled /t REG_DWORD /d 1 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpType /t REG_DWORD /d 0 /f

      - name: Exclude workspace from Windows Defender
        shell: pwsh
        run: |
          # Defender real-time scanning can lock .php temp files that
          # run-tests.php creates, causing 30-second timeouts and
          # "Permission denied" errors on retry.
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "${{ runner.temp }}"

      - name: Build the extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          args: --with-judy=${{ runner.temp }}\libjudy
          test-workers: "1"
          test-runner-args: "--set-timeout 30"
        env:
          TEST_PHP_JUNIT: ${{ runner.temp }}\junit.xml

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-windows-${{ matrix.php-version }}-${{ matrix.arch }}-${{ matrix.ts }}
          path: ${{ runner.temp }}\junit.xml
          if-no-files-found: ignore

      - name: Run benchmarks
        if: success()
        shell: pwsh
        continue-on-error: true
        timeout-minutes: 15
        run: |
          $ErrorActionPreference = "Continue"

          # Locate php.exe from the build (php-windows-builder downloads PHP here)
          $phpExe = Get-ChildItem -Path ".\build" -Recurse -Filter "php.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $phpExe) {
            Write-Host "WARNING: php.exe not found in .\build, skipping benchmarks"
            exit 0
          }
          $phpDir = $phpExe.DirectoryName
          Write-Host "Found PHP at: $phpDir"

          # Locate the built extension DLL
          $extDll = Get-ChildItem -Path ".\build" -Recurse -Filter "php_judy.dll" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $extDll) {
            Write-Host "WARNING: php_judy.dll not found, skipping benchmarks"
            exit 0
          }
          Write-Host "Found extension at: $($extDll.FullName)"

          # Put php.exe directory on PATH so shell_exec('php ...') sub-processes work
          $env:PATH = "$phpDir;$env:PATH"

          # Create/append php.ini next to php.exe so both main and sub-processes load the extension
          $iniPath = Join-Path $phpDir "php.ini"
          @"
          extension=$($extDll.FullName)
          memory_limit=4G
          "@ | Add-Content $iniPath

          # Verify extension loads
          $mods = & $phpExe.FullName -m 2>&1 | Out-String
          if ($mods -notmatch 'judy') {
            Write-Host "WARNING: judy extension not loading, skipping benchmarks"
            Write-Host $mods
            exit 0
          }
          Write-Host "Extension verified"

          # Unified benchmark: all suites, JSON output for cross-version comparison
          & $phpExe.FullName examples/judy-bench.php `
            --json bench.json --size 500000 --iterations 7 --suite all `
            2>&1 | Tee-Object -FilePath benchmark-output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-windows-php${{ matrix.php-version }}-${{ matrix.arch }}-${{ matrix.ts }}
          path: |
            bench.json
            benchmark-output.txt
          if-no-files-found: ignore

      - name: Debug on failure
        if: failure()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"

          Write-Host "=== libjudy install ==="
          $dir = Join-Path $env:RUNNER_TEMP "libjudy"
          if (Test-Path $dir) {
            Get-ChildItem -Path $dir -Recurse -File | ForEach-Object {
              Write-Host "  $($_.FullName.Substring($dir.Length)) ($($_.Length) bytes)"
            }
          }

          Write-Host "`n=== Configure log (tail) ==="
          Get-ChildItem -Path ".\build" -Recurse -Filter "config*.log" -ErrorAction SilentlyContinue |
            Select-Object -First 1 | ForEach-Object { Get-Content $_.FullName -Tail 50 }

          Write-Host "`n=== Build log (tail) ==="
          Get-ChildItem -Path ".\build" -Recurse -Filter "build*.log" -ErrorAction SilentlyContinue |
            Select-Object -First 1 | ForEach-Object { Get-Content $_.FullName -Tail 30 }

  report-results:
    needs: [build-linux, build-windows]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: baselines

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: artifacts

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          path: benchmarks
        continue-on-error: true

      - name: Publish test check
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "artifacts/**/*.xml"
          check_name: "Test Results"
          comment_mode: "off"
          job_summary: false

      - name: Build consolidated report
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import os, glob, re, json

          # ── Test Results ──────────────────────────────────────────
          rows = []
          for xml_file in sorted(glob.glob("artifacts/junit-*/*.xml")):
              dir_name = os.path.basename(os.path.dirname(xml_file))
              parts = dir_name.replace("junit-", "").split("-")

              if parts[0] == "linux":
                  platform, php, arch, ts = "Linux", parts[1], "x64", "-"
              else:
                  platform = "Windows"
                  php = parts[1]
                  arch = parts[2] if len(parts) > 2 else "x64"
                  ts = parts[3] if len(parts) > 3 else "nts"

              try:
                  tree = ET.parse(xml_file)
                  root = tree.getroot()
                  ts_elem = root.find("testsuite") if root.tag == "testsuites" else root
                  if ts_elem is None:
                      continue
                  tests = int(ts_elem.get("tests", 0))
                  failures = int(ts_elem.get("failures", 0))
                  errors = int(ts_elem.get("errors", 0))
                  skipped = int(ts_elem.get("skipped", 0))
                  time_val = float(ts_elem.get("time", 0))
                  passed = tests - failures - errors - skipped
                  status = "\u2705" if failures == 0 and errors == 0 else "\u274c"
              except Exception:
                  tests = failures = errors = skipped = passed = 0
                  time_val = 0.0
                  status = "\u26a0\ufe0f"

              rows.append({
                  "php": php, "platform": platform, "arch": arch, "ts": ts,
                  "tests": tests, "passed": passed, "failures": failures,
                  "skipped": skipped, "errors": errors,
                  "duration": f"{time_val:.1f}s", "status": status
              })

          rows.sort(key=lambda r: (r["platform"], [int(x) for x in r["php"].split(".")]))

          lines = []
          lines.append("## Test Results\n")
          lines.append("| | PHP | Platform | Arch | TS | Tests | Pass | Fail | Skip | Duration |")
          lines.append("|---|-----|----------|------|----|-------|------|------|------|----------|")
          for r in rows:
              lines.append(
                  f'| {r["status"]} | {r["php"]} | {r["platform"]} '
                  f'| {r["arch"]} | {r["ts"]} | {r["tests"]} | {r["passed"]} '
                  f'| {r["failures"]} | {r["skipped"]} | {r["duration"]} |'
              )

          total_tests = sum(r["tests"] for r in rows)
          total_pass = sum(r["passed"] for r in rows)
          total_fail = sum(r["failures"] for r in rows)
          total_skip = sum(r["skipped"] for r in rows)
          all_pass = total_fail == 0 and all(r["errors"] == 0 for r in rows)
          icon = "\u2705" if all_pass else "\u274c"
          lines.append(
              f"| {icon} | **Total** | | | "
              f"| **{total_tests}** | **{total_pass}** | **{total_fail}** "
              f"| **{total_skip}** | |"
          )

          # ── Benchmark Results (from JSON) ─────────────────────────

          def fmt_ms(ms):
              """Format milliseconds for display."""
              if ms is None:
                  return "-"
              if ms >= 1:
                  return f"{ms:.1f} ms"
              return f"{ms:.2f} ms"

          def fmt_speedup(judy_ms, php_ms):
              """Speedup = PHP / Judy. >1 = Judy faster.
              Returns (judy_str, php_str, speedup_str)."""
              if judy_ms is None or php_ms is None:
                  return "-", "-", "-"
              j_str = fmt_ms(judy_ms)
              p_str = fmt_ms(php_ms)
              if judy_ms <= 0:
                  return j_str, p_str, "**\u221e**"
              s = php_ms / judy_ms
              if s >= 100:
                  text = f"{s:.0f}x"
              elif s >= 1.05:
                  text = f"{s:.1f}x"
              elif s >= 0.95:
                  text = "~1.0x"
              else:
                  text = f"{s:.1f}x"
              return j_str, p_str, f"**{text}**" if s >= 1.05 else text

          def fmt_speedup_only(judy_ms, php_ms):
              """Compact speedup for cross-version tables."""
              if judy_ms is None or php_ms is None:
                  return "-"
              if judy_ms <= 0:
                  return "**\u221e**"
              s = php_ms / judy_ms
              if s >= 100:
                  text = f"{s:.0f}x"
              elif s >= 1.05:
                  text = f"{s:.1f}x"
              elif s >= 0.95:
                  text = "~1.0x"
              else:
                  text = f"{s:.1f}x"
              return f"**{text}**" if s >= 1.05 else text

          def fmt_bytes(b):
              if b is None or b <= 0:
                  return "-"
              if b >= 1 << 20:
                  return f"{b / (1 << 20):.1f} MB"
              if b >= 1 << 10:
                  return f"{b / (1 << 10):.1f} KB"
              return f"{b} B"

          def fmt_mem_savings(judy_bytes, php_bytes):
              if judy_bytes is None or php_bytes is None:
                  return "-"
              if judy_bytes <= 0:
                  return "**\u221e**"
              ratio = php_bytes / judy_bytes
              if ratio >= 1.05:
                  return f"**{ratio:.1f}x less**"
              elif ratio >= 0.95:
                  return "~1.0x"
              return f"{ratio:.1f}x"

          def get_metric(benchmarks, key, field="median_ms"):
              entry = benchmarks.get(key)
              if entry is None:
                  return None
              return entry.get(field)

          # Type definitions with human-readable labels
          all_types = [
              ("bitset", "Bitset"),
              ("int_to_int", "Int to Int"),
              ("int_to_mixed", "Int to Mixed"),
              ("int_to_packed", "Int to Packed"),
              ("string_to_int", "String to Int"),
              ("string_to_mixed", "String to Mixed"),
              ("string_to_int_hash", "String to Int (Hash)"),
              ("string_to_mixed_hash", "String to Mixed (Hash)"),
              ("string_to_int_adaptive", "String to Int (Adaptive)"),
              ("string_to_mixed_adaptive", "String to Mixed (Adaptive)"),
          ]
          # Representative subset for the main view
          main_types = [
              ("bitset", "Bitset"),
              ("int_to_int", "Int to Int"),
              ("int_to_mixed", "Int to Mixed"),
              ("string_to_int", "String to Int"),
              ("string_to_int_adaptive", "String to Int (Adaptive)"),
          ]

          api_ops = [
              ("api.putAll.int_to_int", "putAll()"),
              ("api.fromArray.int_to_int", "fromArray()"),
              ("api.toArray.int_to_int", "toArray()"),
              ("api.getAll.int_to_int", "getAll()"),
              ("api.keys.int_to_int", "keys()"),
              ("api.values.int_to_int", "values()"),
              ("api.sumValues.int_to_int", "sumValues()"),
              ("api.populationCount.int_to_int", "populationCount()"),
              ("api.deleteRange.int_to_int", "deleteRange()"),
              ("api.equals.int_to_int", "equals()"),
              ("api.setop.union.bitset", "union() Bitset"),
              ("api.setop.intersect.bitset", "intersect() Bitset"),
              ("api.setop.diff.bitset", "diff() Bitset"),
              ("api.setop.xor.bitset", "xor() Bitset"),
              ("adv.forEach.int_to_int", "forEach() Int\u2192Int"),
              ("adv.filter.int_to_int", "filter() Int\u2192Int"),
              ("adv.map.int_to_int", "map() Int\u2192Int"),
              ("adv.forEach.string_to_int", "forEach() Str\u2192Int"),
              ("adv.filter.string_to_int", "filter() Str\u2192Int"),
              ("adv.map.string_to_int", "map() Str\u2192Int"),
          ]

          # Load JSON benchmark data per (platform, php_ver)
          bench_json = {}
          bench_text = {}

          for bench_dir in sorted(glob.glob("benchmarks/benchmark-*")):
              dir_name = os.path.basename(bench_dir)
              m = re.match(r'^benchmark-(linux|windows)-php([\d.]+)', dir_name)
              if not m:
                  continue
              platform = m.group(1).capitalize()
              php_ver = m.group(2)

              json_file = os.path.join(bench_dir, "bench.json")
              if os.path.isfile(json_file):
                  with open(json_file) as f:
                      try:
                          bench_json[(platform, php_ver)] = json.load(f)
                      except json.JSONDecodeError:
                          pass

              text_file = os.path.join(bench_dir, "benchmark-output.txt")
              if os.path.isfile(text_file):
                  with open(text_file) as f:
                      bench_text[(platform, php_ver)] = f.read().strip()

          if bench_json:
              # Determine platforms and versions
              platforms = sorted(set(p for p, _ in bench_json.keys()))
              platform_versions = {}
              for platform in platforms:
                  platform_versions[platform] = sorted(
                      [v for p, v in bench_json.keys() if p == platform],
                      key=lambda v: [int(x) for x in v.split(".")]
                  )

              # Get metadata from the latest version of the primary platform
              primary = "Linux" if "Linux" in platforms else platforms[0]
              latest = platform_versions[primary][-1]
              meta = bench_json.get((primary, latest), {}).get("metadata", {})
              judy_ver = meta.get("judy_version", "?")
              elem_size = meta.get("size", 500000)
              iters = meta.get("iterations", 3)

              lines.append("")
              lines.append("## Benchmark Results\n")
              lines.append(
                  f"> {elem_size:,} elements, {iters} iterations (median), "
                  f"Judy {judy_ver}\n"
              )

              # ── Run Status grid ──
              all_versions = sorted(
                  set(v for _, v in bench_json.keys()),
                  key=lambda v: [int(x) for x in v.split(".")]
              )
              lines.append("### Run Status\n")
              ver_hdr = " | ".join(f"PHP {v}" for v in all_versions)
              lines.append(f"| Platform | {ver_hdr} |")
              lines.append("|---|" + "|".join("---" for _ in all_versions) + "|")
              for platform in platforms:
                  cells = []
                  for v in all_versions:
                      if (platform, v) in bench_json:
                          cells.append("\u2705")
                      else:
                          cells.append("\u2014")
                  lines.append(f"| {platform} | " + " | ".join(cells) + " |")
              lines.append("")

              # ── Helper to emit tables for a given platform/version ──
              def emit_tables(platform, ver, heading_suffix=""):
                  data = bench_json.get((platform, ver), {})
                  bm = data.get("benchmarks", {})
                  if not bm:
                      return

                  tag = f" ({platform}, PHP {ver})"

                  # Memory Efficiency
                  lines.append(f"### Memory Efficiency{tag}{heading_suffix}\n")
                  lines.append("| Type | Judy | PHP array | Savings |")
                  lines.append("|------|-----:|----------:|---------|")
                  for type_id, label in all_types:
                      j_heap = get_metric(bm, f"core.{type_id}.heap.judy", "heap_bytes")
                      p_heap = get_metric(bm, f"core.{type_id}.heap.php", "heap_bytes")
                      if j_heap is None and p_heap is None:
                          continue
                      lines.append(
                          f"| {label} | {fmt_bytes(j_heap)} "
                          f"| {fmt_bytes(p_heap)} "
                          f"| {fmt_mem_savings(j_heap, p_heap)} |"
                      )
                  lines.append("")

                  # API Speedups
                  has_api = any(
                      get_metric(bm, f"{prefix}.judy") is not None
                      for prefix, _ in api_ops
                  )
                  if has_api:
                      lines.append(f"### API Speedups{tag}{heading_suffix}\n")
                      lines.append(
                          "Speedup = PHP time / Judy time. "
                          "**Bold** = Judy faster.\n"
                      )
                      lines.append("| Operation | Judy | PHP | Speedup |")
                      lines.append("|-----------|-----:|----:|---------|")
                      for prefix, label in api_ops:
                          j_ms = get_metric(bm, f"{prefix}.judy")
                          p_ms = get_metric(bm, f"{prefix}.php")
                          if j_ms is None:
                              continue
                          j_str, p_str, s_str = fmt_speedup(j_ms, p_ms)
                          lines.append(
                              f"| {label} | {j_str} | {p_str} | {s_str} |"
                          )
                      lines.append("")

                  # Core Types (representative in main, all in detail)
                  def emit_core_table(type_list, detail_tag=""):
                      lines.append(f"### Core Types{tag}{detail_tag}{heading_suffix}\n")
                      lines.append(
                          "Speedup = PHP time / Judy time. "
                          "**Bold** = Judy faster.\n"
                      )
                      lines.append("| Type | Op | Judy | PHP array | Speedup |")
                      lines.append("|------|----|-----:|----------:|---------|")
                      for type_id, label in type_list:
                          for metric, op_label in [
                              ("write", "Write"), ("read", "Read"),
                              ("iter", "Iter"), ("free", "Free"),
                          ]:
                              j_ms = get_metric(bm, f"core.{type_id}.{metric}.judy")
                              p_ms = get_metric(bm, f"core.{type_id}.{metric}.php")
                              if j_ms is None and p_ms is None:
                                  continue
                              j_str, p_str, s_str = fmt_speedup(j_ms, p_ms)
                              lines.append(
                                  f"| {label} | {op_label} "
                                  f"| {j_str} | {p_str} | {s_str} |"
                              )
                      lines.append("")

                  emit_core_table(main_types)

                  # Collapsible: all types
                  extra_types = [t for t in all_types if t not in main_types]
                  has_extra = any(
                      get_metric(bm, f"core.{tid}.write.judy") is not None
                      for tid, _ in extra_types
                  )
                  if has_extra:
                      lines.append(
                          "<details><summary>All types detail"
                          "</summary>\n"
                      )
                      emit_core_table(all_types, " \u2014 All")
                      lines.append("</details>\n")

              # ── Primary platform (Linux) ── shown expanded ──
              emit_tables(primary, latest)

              # ── Cross-version detail per platform ──
              for platform in platforms:
                  versions = platform_versions[platform]
                  if len(versions) <= 1:
                      continue
                  lines.append(
                      f"<details><summary>Cross-version detail "
                      f"({platform})</summary>\n"
                  )
                  ver_hdr = " | ".join(f"PHP {v}" for v in versions)

                  # Core cross-version table
                  lines.append(f"#### Core Types \u2014 {platform}\n")
                  lines.append(
                      "Each cell: Judy ms (speedup vs PHP array).\n"
                  )
                  lines.append(f"| Type | Op | {ver_hdr} |")
                  lines.append("|---|---|" + "|".join("---" for _ in versions) + "|")
                  for type_id, label in all_types:
                      for metric, op_label in [("write", "Write"), ("read", "Read")]:
                          cells = []
                          any_data = False
                          for v in versions:
                              data = bench_json.get((platform, v), {})
                              bm = data.get("benchmarks", {})
                              j_ms = get_metric(bm, f"core.{type_id}.{metric}.judy")
                              p_ms = get_metric(bm, f"core.{type_id}.{metric}.php")
                              if j_ms is not None:
                                  s = fmt_speedup_only(j_ms, p_ms)
                                  cells.append(f"{fmt_ms(j_ms)} ({s})")
                                  any_data = True
                              else:
                                  cells.append("-")
                          if any_data:
                              lines.append(
                                  f"| {label} | {op_label} | "
                                  + " | ".join(cells) + " |"
                              )
                  lines.append("")

                  # API cross-version table
                  lines.append(f"#### API \u2014 {platform}\n")
                  lines.append(f"| Operation | {ver_hdr} |")
                  lines.append("|---|" + "|".join("---" for _ in versions) + "|")
                  for prefix, label in api_ops:
                      cells = []
                      any_data = False
                      for v in versions:
                          data = bench_json.get((platform, v), {})
                          bm = data.get("benchmarks", {})
                          j_ms = get_metric(bm, f"{prefix}.judy")
                          p_ms = get_metric(bm, f"{prefix}.php")
                          if j_ms is not None:
                              s = fmt_speedup_only(j_ms, p_ms)
                              cells.append(f"{fmt_ms(j_ms)} ({s})")
                              any_data = True
                          else:
                              cells.append("-")
                      if any_data:
                          lines.append(
                              f"| {label} | " + " | ".join(cells) + " |"
                          )
                  lines.append("")
                  lines.append("</details>\n")

              # ── Secondary platforms (e.g. Windows) in collapsible ──
              for platform in platforms:
                  if platform == primary:
                      continue
                  p_latest = platform_versions[platform][-1]
                  lines.append(
                      f"<details><summary>{platform} results "
                      f"(PHP {p_latest})</summary>\n"
                  )
                  emit_tables(platform, p_latest)
                  lines.append("</details>\n")

              # ── Cross-release baseline comparison ──
              # Prefer CI-generated baseline (same runner = no arch noise)
              baseline = None
              baseline_source = None

              for bdir in sorted(glob.glob(
                  "benchmarks/benchmark-baseline-*"
              )):
                  bf = os.path.join(bdir, "baseline-bench.json")
                  if os.path.isfile(bf):
                      with open(bf) as f:
                          try:
                              baseline = json.load(f)
                              baseline_source = "same-runner"
                          except json.JSONDecodeError:
                              pass
                      break

              # Fallback: committed baseline file
              if baseline is None:
                  fallback = "baselines/latest.json"
                  if os.path.isfile(fallback):
                      with open(fallback) as f:
                          try:
                              baseline = json.load(f)
                              baseline_source = "committed"
                          except json.JSONDecodeError:
                              pass

              if baseline and baseline.get("benchmarks"):
                  base_bm = baseline["benchmarks"]
                  base_ver = baseline.get("metadata", {}).get(
                      "judy_version", "?"
                  )

                  # Pick current data: primary platform, latest PHP
                  cur_data = bench_json.get((primary, latest), {})
                  cur_bm = cur_data.get("benchmarks", {})
                  cur_ver = cur_data.get("metadata", {}).get(
                      "judy_version", "?"
                  )

                  if cur_bm:
                      threshold = 10.0
                      min_ms = 2.0  # ignore sub-2ms timings (noise)
                      all_ids = sorted(
                          set(list(base_bm.keys()) + list(cur_bm.keys()))
                      )

                      comparisons = []
                      new_entries = []
                      removed_entries = []
                      counts = {
                          "faster": 0, "slower": 0, "same": 0,
                          "new": 0, "removed": 0,
                      }

                      for bid in all_ids:
                          # Only compare .judy entries (Judy's own perf)
                          if not bid.endswith(".judy"):
                              continue
                          # Skip heap-only entries
                          b_entry = base_bm.get(bid, {})
                          c_entry = cur_bm.get(bid, {})
                          if (b_entry.get("median_ms", 0) == 0
                              and b_entry.get("heap_bytes")):
                              continue
                          if (c_entry.get("median_ms", 0) == 0
                              and c_entry.get("heap_bytes")):
                              continue

                          b_ms = b_entry.get("median_ms")
                          c_ms = c_entry.get("median_ms")

                          # Short display name: strip .judy suffix
                          name = bid[:-5]

                          if b_ms is None and c_ms is not None:
                              new_entries.append((name, c_ms))
                              counts["new"] += 1
                          elif b_ms is not None and c_ms is None:
                              removed_entries.append((name, b_ms))
                              counts["removed"] += 1
                          elif b_ms is not None and c_ms is not None:
                              if b_ms <= 0:
                                  delta_pct = 0.0
                                  status = "~same"
                              elif b_ms < min_ms and c_ms < min_ms:
                                  # Sub-threshold: too small to compare
                                  delta_pct = 0.0
                                  status = "~same"
                                  counts["same"] += 1
                              else:
                                  delta_pct = (
                                      (c_ms - b_ms) / b_ms
                                  ) * 100
                                  if delta_pct < -threshold:
                                      status = "FASTER"
                                      counts["faster"] += 1
                                  elif delta_pct > threshold:
                                      status = "SLOWER"
                                      counts["slower"] += 1
                                  else:
                                      status = "~same"
                                      counts["same"] += 1
                              comparisons.append(
                                  (name, b_ms, c_ms, delta_pct, status)
                              )

                      # Emit section
                      lines.append(
                          f"### Release Comparison "
                          f"({base_ver} \u2192 {cur_ver})\n"
                      )
                      if baseline_source == "same-runner":
                          lines.append(
                              f"> Baseline: v{base_ver} via "
                              f"`pie install` on **same CI "
                              f"runner**. "
                              f"Comparing {primary} PHP {latest}. "
                              f"Threshold: \u00b1{threshold:.0f}% "
                              f"(entries < {min_ms:.0f} ms ignored).\n"
                          )
                      else:
                          lines.append(
                              f"> \u26a0\ufe0f Baseline: v{base_ver} "
                              f"from committed file "
                              f"(cross-architecture — deltas may "
                              f"be unreliable). "
                              f"Threshold: \u00b1{threshold:.0f}%.\n"
                          )
                      # Summary line
                      parts = []
                      if counts["faster"]:
                          parts.append(
                              f"{counts['faster']} faster"
                          )
                      if counts["slower"]:
                          parts.append(
                              f"\u26a0\ufe0f **{counts['slower']} "
                              f"regressions**"
                          )
                      else:
                          parts.append("0 regressions")
                      if counts["same"]:
                          parts.append(
                              f"{counts['same']} unchanged"
                          )
                      if counts["new"]:
                          parts.append(f"{counts['new']} new")
                      if counts["removed"]:
                          parts.append(
                              f"{counts['removed']} removed"
                          )
                      lines.append(
                          "**Summary**: " + ", ".join(parts) + "\n"
                      )

                      # Comparison table (only changed + same)
                      if comparisons:
                          lines.append(
                              "| Benchmark | Baseline | Current "
                              "| Delta | Status |"
                          )
                          lines.append(
                              "|-----------|----------|---------|"
                              "------:|--------|"
                          )
                          for name, b_ms, c_ms, delta, status in comparisons:
                              b_str = fmt_ms(b_ms)
                              c_str = fmt_ms(c_ms)
                              if abs(delta) < 0.05:
                                  d_str = "0.0%"
                              elif delta > 0:
                                  d_str = f"+{delta:.1f}%"
                              else:
                                  d_str = f"{delta:.1f}%"
                              if status == "FASTER":
                                  s_str = "\u2705 **FASTER**"
                              elif status == "SLOWER":
                                  s_str = "\u26a0\ufe0f **SLOWER**"
                              else:
                                  s_str = "~same"
                              lines.append(
                                  f"| {name} | {b_str} | {c_str} "
                                  f"| {d_str} | {s_str} |"
                              )
                          lines.append("")

                      # Collapsible: new benchmarks
                      if new_entries:
                          lines.append(
                              f"<details><summary>"
                              f"{counts['new']} new benchmarks "
                              f"(not in baseline)</summary>\n"
                          )
                          lines.append(
                              "| Benchmark | Current |"
                          )
                          lines.append("|-----------|---------|")
                          for name, c_ms in new_entries:
                              lines.append(
                                  f"| {name} | {fmt_ms(c_ms)} |"
                              )
                          lines.append("")
                          lines.append("</details>\n")

                      # Collapsible: removed benchmarks
                      if removed_entries:
                          lines.append(
                              f"<details><summary>"
                              f"{counts['removed']} removed benchmarks"
                              f"</summary>\n"
                          )
                          lines.append(
                              "| Benchmark | Baseline |"
                          )
                          lines.append("|-----------|----------|")
                          for name, b_ms in removed_entries:
                              lines.append(
                                  f"| {name} | {fmt_ms(b_ms)} |"
                              )
                          lines.append("")
                          lines.append("</details>\n")

              # ── Collapsible raw benchmark output ──
              lines.append("<details><summary>Full benchmark output</summary>\n")
              for platform in platforms:
                  versions = sorted(
                      [v for p, v in bench_text.keys() if p == platform],
                      key=lambda v: [int(x) for x in v.split(".")]
                  )
                  if versions:
                      p_latest = versions[-1]
                      text = bench_text.get((platform, p_latest), "")
                      if text:
                          lines.append(f"#### {platform} \u2014 PHP {p_latest}\n")
                          lines.append("```")
                          lines.append(text)
                          lines.append("```\n")
              lines.append("</details>\n")

          report = "\n".join(lines) + "\n"

          with open("report.md", "w") as f:
              f.write(report)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(report)
          PYEOF

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');
            const marker = '<!-- ci-consolidated-results -->';
            const fullBody = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
